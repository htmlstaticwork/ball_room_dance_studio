<svg viewBox="0 0 280 48" xmlns="http://www.w3.org/2000/svg" width="280" height="48">
  <g fill="#C8973A">
    <!-- Head -->
    <circle cx="16" cy="7" r="4"/>
    <!-- Body -->
    <line x1="16" y1="11" x2="16" y2="26" stroke="#C8973A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left arm raised -->
    <line x1="16" y1="15" x2="8" y2="10" stroke="#C8973A" stroke-width="2" stroke-linecap="round"/>
    <!-- Right arm out -->
    <line x1="16" y1="15" x2="24" y2="18" stroke="#C8973A" stroke-width="2" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="16" y1="26" x2="10" y2="38" stroke="#C8973A" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Right leg extended -->
    <line x1="16" y1="26" x2="24" y2="34" stroke="#C8973A" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Skirt/flow line -->
    <path d="M10,22 Q16,30 22,22" fill="none" stroke="#C8973A" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Text: DanceStudio -->
  <text x="36" y="32" font-family="Playfair Display, Georgia, serif" font-size="22" font-weight="700" fill="#C8973A" letter-spacing="0.5">DanceStudio</text>
</svg>
