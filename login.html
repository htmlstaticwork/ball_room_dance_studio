<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanceStudio | Login</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <meta name="description" content="Login to your DanceStudio account">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>

<body class="auth-page">

  <!-- Auth Theme/RTL Controls (Simplified) -->
  <div style="position: fixed; top: 24px; right: 24px; display: flex; gap: 12px; z-index: 1000;">
    <button class="btn-icon rtl-toggle" aria-label="Toggle RTL" title="Toggle RTL">🌍</button>
    <button class="btn-icon theme-toggle" aria-label="Toggle dark mode" title="Toggle Theme">🌙</button>
  </div>

  <div class="auth-card fade-in-up">
    <a href="index.html" class="logo" style="display: flex; justify-content: center; margin-bottom: 24px; width: 100%;">
      <img src="assets/images/logo.svg" alt="DanceStudio" style="height: 36px; width: auto; margin-left: 35px;">
    </a>
    <h3 style="font-size: 1rem; margin-bottom: 24px;">Welcome back Dancer</h3>

    <form id="register-form" action="dashboard.html">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="password-input">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <button type="button" class="btn-eye" aria-label="Toggle password visibility">👁️</button>
        </div>
        <div class="auth-options">
          <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary mt-4">Log In</button>
    </form>

    <div class="auth-divider">or continue with</div>

    <div class="social-auth">
      <button class="btn-social" aria-label="Login with Google">
        <i class="fab fa-google" style="color: #DB4437;"></i> Google
      </button>
      <button class="btn-social" aria-label="Login with Apple">
        <i class="fab fa-apple"></i> Apple
      </button>
    </div>

    <p style="margin-top: 24px; font-size: 0.875rem;">
      Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
    </p>
  </div>

  <script src="assets/js/main.js"></script>
</body>

</html>
