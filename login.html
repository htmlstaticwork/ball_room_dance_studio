<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanceStudio | Login</title>
  <meta name="description" content="Login to your DanceStudio account">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="auth-page">

  <button class="btn-icon theme-toggle" aria-label="Toggle dark mode" title="Toggle Theme" style="position: absolute; top: 16px; right: 16px;">🌙</button>
  <button class="btn-icon rtl-toggle" aria-label="Toggle RTL" title="Toggle RTL" style="position: absolute; top: 16px; right: 56px;">🌍</button>

  <div class="auth-card fade-in-up">
    <a href="index.html" class="auth-logo">DanceStudio</a>
    <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Welcome back</h2>

    <form id="register-form" action="dashboard.html">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label" style="display: flex; justify-content: space-between;">
          Password
          <a href="#" style="font-size: 0.8rem; color: var(--primary);">Forgot?</a>
        </label>
        <div class="password-input">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <button type="button" class="btn-eye" aria-label="Toggle password visibility">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary mt-4">Log In</button>
    </form>

    <div class="auth-divider">or continue with</div>

    <div class="social-auth">
      <button class="btn-social" aria-label="Login with Google">
        <span style="font-size: 1.2rem;">G</span> Google
      </button>
      <button class="btn-social" aria-label="Login with Apple">
        <span style="font-size: 1.2rem;">🍎</span> Apple
      </button>
    </div>

    <p style="margin-top: 24px; font-size: 0.875rem;">
      Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
    </p>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
